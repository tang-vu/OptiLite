name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============= CHECKS =============
  checks:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Check formatting
        run: |
          npx prettier --check "src/**/*.{ts,tsx,css}" || true

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: |
            *.log
            coverage/

  # ============= WINDOWS BUILD =============
  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}-pc-windows-msvc

      - name: Install Rust dependencies cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Build Vite frontend
        run: npm run build:web

      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: Build Windows app (Release)
        run: npx tauri build --target ${{ matrix.target }}-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optilite-windows-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Create release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Copy-Item "src-tauri/target/${{ matrix.target }}-pc-windows-msvc/release/bundle/nsis/*.exe" -Destination "OptiLite-${{ github.ref_name }}-Windows-x64.exe" -ErrorAction SilentlyContinue
          Copy-Item "src-tauri/target/${{ matrix.target }}-pc-windows-msvc/release/bundle/msi/*.msi" -Destination "OptiLite-${{ github.ref_name }}-Windows-x64.msi" -ErrorAction SilentlyContinue

  # ============= LINUX BUILD =============
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust dependencies cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build:web

      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: Build Linux app
        run: npx tauri build --target ${{ matrix.target }}-unknown-linux-gnu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optilite-linux-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  # ============= MACOS BUILD =============
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}-apple-darwin

      - name: Install Rust dependencies cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build:web

      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli

      - name: Build macOS app
        run: npx tauri build --target ${{ matrix.target }}-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optilite-macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}-apple-darwin/release/bundle/macos/*.app

  # ============= CREATE RELEASE =============
  create-release:
    name: Create GitHub Release
    needs: [checks, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      packages: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Generate release notes
        run: |
          echo "## 🎉 OptiLite ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### 🚀 What's New" >> release-notes.md
          echo "" >> release-notes.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> release-notes.md || true
          echo "" >> release-notes.md
          echo "### 📦 Downloads" >> release-notes.md
          echo "" >> release-notes.md
          echo "- **Windows**: NSIS Installer (.exe) or MSI (.msi)" >> release-notes.md
          echo "- **macOS**: DMG Installer (.dmg) - Intel & Apple Silicon" >> release-notes.md
          echo "- **Linux**: DEB Package (.deb) or AppImage (.AppImage)" >> release-notes.md
          echo "" >> release-notes.md
          echo "### ⚡ Features" >> release-notes.md
          echo "" >> release-notes.md
          echo "- 🔋 TRUE RAM optimization (no swap pushing)" >> release-notes.md
          echo "- 🌐 Chrome memory reduction" >> release-notes.md
          echo "- 💾 Disk health monitoring (SMART)" >> release-notes.md
          echo "- 🗑️ Junk file scanner & cleaner" >> release-notes.md
          echo "- 🎮 GPU monitoring" >> release-notes.md
          echo "- 🌡️ Temperature sensors" >> release-notes.md
          echo "- 🤖 Auto-optimization scheduler" >> release-notes.md
          echo "- ⚙️ Persistent settings" >> release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============= AUTO TAG =============
  auto-tag:
    name: Auto Tag (on main branch)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag
        run: |
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
